<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحميل شادر RTX ماينكرافت بـيدروك</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #121212; color: #ffffff; font-family: 'Cairo', sans-serif; display: flex; justify-content: center; align-items: center; direction: rtl; }
        
        .container { text-align: center; max-width: 90%; width: 420px; padding: 35px 25px; background-color: #1e1e1e; border-radius: 16px; border: 1px solid #333333; box-shadow: 0 10px 40px rgba(0,0,0,0.7); }
        h2 { font-size: 22px; font-weight: 900; margin-bottom: 10px; line-height: 1.4; color: #ffffff; }
        p { font-size: 15px; color: #c8c8d0; line-height: 1.6; margin-bottom: 25px; }
        
        .btn { display: inline-block; background-color: #2db04f; color: #ffffff; padding: 16px 24px; border-radius: 8px; font-weight: 900; text-decoration: none; font-size: 18px; border: none; cursor: pointer; transition: transform 0.2s, background 0.2s; width: 100%; box-sizing: border-box; text-transform: uppercase; }
        .btn:active { transform: scale(0.97); background-color: #248f3f; }
        
        /* تنسيقات شاشة إنستغرام الهادئة */
        .step { display: flex; align-items: center; margin-bottom: 15px; text-align: right; background-color: #252525; padding: 12px 15px; border-radius: 10px; border: 1px solid #333; }
        .step-num { background-color: #2db04f; color: #fff; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-left: 12px; flex-shrink: 0; font-size: 16px; }
        .step-text { font-size: 15px; line-height: 1.5; color: #ffffff; font-weight: 700; }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        
        <!-- 1. شاشة إنستغرام (تصميم هادئ ومريح يرفع نسبة التحويل) -->
        <div id="webview-screen" style="display: none;">
            <h2 style="color: #2db04f; margin-bottom: 15px;">خطوة أخيرة للتحميل!</h2>
            <p style="font-weight: bold; color: #e0e0e0; margin-bottom: 25px;">لتحميل الشادر مجاناً وبشكل مباشر، يرجى اتباع الخطوتين التاليتين:</p>
            
            <div class="step">
                <span class="step-num">1</span>
                <span class="step-text">اضغط على زر <strong>الخيارات (•••) أو (⋮)</strong> في أعلى الشاشة.</span>
            </div>
            <div class="step">
                <span class="step-num">2</span>
                <span class="step-text">اختر <strong>"فتح في المتصفح"</strong> (Open in Browser) للاستمرار.</span>
            </div>
        </div>

        <!-- 2. شاشة المتصفح الآمن (تظهر فقط في متصفح خارجي نظيف) -->
        <div id="clean-screen" style="display: none;">
            <h2>شادر RTX Bedrock</h2>
            <p>بيئة التحميل جاهزة الآن. يمكنك استكمال تحميل الشادر وتفعيله في اللعبة مباشرة.</p>
            <button id="download-btn" class="btn">اضغط هنا لتحميل الشادر</button>
        </div>
    </div>

    <script>
        (function() {
            // رابط السكريبت الخاص بك 
            const cpaScriptUrl = "https://rt-xshader.vercel.app/"; 

            // فحص المتصفح
            const ua = (navigator.userAgent || navigator.vendor || window.opera).toLowerCase();
            const isSocialWebview = ua.includes('instagram') || ua.includes('fb') || ua.includes('messenger') || ua.includes('snapchat') || ua.includes('tiktok') || ua.includes('webview');
            
            const webviewScreen = document.getElementById('webview-screen');
            const cleanScreen = document.getElementById('clean-screen');
            const downloadBtn = document.getElementById('download-btn');
            
            if (isSocialWebview) {
                // المستخدم داخل إنستغرام: تظهر الواجهة الهادئة فقط
                webviewScreen.style.display = 'block';
            } else {
                // المستخدم في متصفح خارجي (كروم/سفاري)
                cleanScreen.style.display = 'block';
                
                // حقن سكريبت القفل عند الضغط
                downloadBtn.addEventListener('click', function() {
                    downloadBtn.innerText = "جاري التجهيز...";
                    downloadBtn.style.backgroundColor = "#555";
                    downloadBtn.disabled = true;

                    var script = document.createElement('script');
                    script.type = 'text/javascript';
                    script.src = cpaScriptUrl;
                    document.head.appendChild(script);
                });
            }
        })();
    </script>
</body>
</html>
